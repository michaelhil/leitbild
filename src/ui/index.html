<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leitbild</title>
    <script>
      (() => {
        try {
          const stored = localStorage.getItem('leitbild.theme')
          const dark = stored === 'dark' || (!stored && matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
        } catch (error) {
          console.warn('Unable to apply Leitbild theme before startup', error)
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
